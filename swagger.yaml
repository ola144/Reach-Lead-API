openapi: 3.0.3

info:
  title: Reach Leads API
  version: 1.0.0
  description: API documentation for the Reach Leads Node.js and Express backend.

servers:
  - url: http://localhost:5000
    description: Local
  - url: https://reach-lead-api.onrender.com/
    description: Production

tags:
  - name: Auth
  - name: Leads
  - name: Campaigns
  - name: Outreach
  - name: Analytics
  - name: Accounts
  - name: AI

paths:
  /api/auth/user-details/{id}:
    get:
      tags:
        - Auth
      summary: Get single user details
      operationId: getUserDetails
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: User details returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags:
        - Auth
      summary: Register a user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in a user
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/leads:
    get:
      tags:
        - Leads
      summary: Get all leads
      operationId: getLeads
      responses:
        "200":
          description: Leads returned successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessListResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Lead"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Leads
      summary: Create a lead
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/leads/stats/overview:
    get:
      tags:
        - Leads
      summary: Get lead status statistics
      operationId: getLeadStats
      responses:
        "200":
          description: Lead statistics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateCountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/leads/stats/pipeline:
    get:
      tags:
        - Leads
      summary: Get lead pipeline statistics
      operationId: getLeadPipelineStats
      responses:
        "200":
          description: Lead pipeline statistics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateTotalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/leads/{id}:
    get:
      tags:
        - Leads
      summary: Get a lead
      operationId: getLead
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Lead returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Leads
      summary: Update a lead
      operationId: updateLead
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdateInput"
      responses:
        "200":
          description: Lead updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Leads
      summary: Delete a lead
      operationId: deleteLead
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Lead deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/campaigns:
    get:
      tags:
        - Campaigns
      summary: Get all campaigns
      operationId: getCampaigns
      responses:
        "200":
          description: Campaigns returned successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessListResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Campaigns
      summary: Create a campaign
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Campaign created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/campaigns/dashboard/metrics:
    get:
      tags:
        - Campaigns
      summary: Get campaign dashboard metrics
      operationId: getCampaignDashboardMetrics
      responses:
        "200":
          description: Campaign dashboard metrics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignDashboardMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/campaigns/{id}:
    get:
      tags:
        - Campaigns
      summary: Get a campaign
      operationId: getCampaign
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Campaign returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Campaigns
      summary: Update a campaign
      operationId: updateCampaign
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdateInput"
      responses:
        "200":
          description: Campaign updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Campaigns
      summary: Delete a campaign
      operationId: deleteCampaign
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Campaign deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/outreach/send:
    post:
      tags:
        - Outreach
      summary: Create outreach message
      operationId: createOutreach
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachInput"
      responses:
        "201":
          description: Outreach message created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/outreach/history:
    get:
      tags:
        - Outreach
      summary: Get outreach history
      operationId: getOutreachHistory
      responses:
        "200":
          description: Outreach history returned successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessListResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Outreach"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/outreach/stats:
    get:
      tags:
        - Outreach
      summary: Get outreach status statistics
      operationId: getOutreachStats
      responses:
        "200":
          description: Outreach statistics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateTotalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/outreach/{id}/status:
    patch:
      tags:
        - Outreach
      summary: Update outreach status
      operationId: updateOutreachStatus
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachStatusUpdateInput"
      responses:
        "200":
          description: Outreach status updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/dashboard:
    get:
      tags:
        - Analytics
      summary: Get dashboard analytics
      operationId: getDashboardAnalytics
      responses:
        "200":
          description: Dashboard analytics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalyticsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/monthly:
    get:
      tags:
        - Analytics
      summary: Get monthly performance analytics
      operationId: getMonthlyPerformance
      responses:
        "200":
          description: Monthly performance analytics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyPerformanceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/platforms:
    get:
      tags:
        - Analytics
      summary: Get platform analytics
      operationId: getPlatformBreakdown
      responses:
        "200":
          description: Platform analytics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformBreakdownResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/pipeline:
    get:
      tags:
        - Analytics
      summary: Get pipeline analytics
      operationId: getPipelineAnalytics
      responses:
        "200":
          description: Pipeline analytics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateTotalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/campaigns/top:
    get:
      tags:
        - Analytics
      summary: Get top campaigns
      operationId: getTopCampaigns
      responses:
        "200":
          description: Top campaigns returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopCampaignsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/analytics/outreach:
    get:
      tags:
        - Analytics
      summary: Get outreach analytics
      operationId: getOutreachAnalytics
      responses:
        "200":
          description: Outreach analytics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateTotalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts:
    get:
      tags:
        - Accounts
      summary: Get connected accounts
      operationId: getAccounts
      responses:
        "200":
          description: Accounts returned successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessListResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SocialAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Accounts
      summary: Connect an account
      operationId: connectAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialAccountInput"
      responses:
        "201":
          description: Account connected successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/stats/platforms:
    get:
      tags:
        - Accounts
      summary: Get account statistics by platform
      operationId: getAccountStats
      responses:
        "200":
          description: Account platform statistics returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateTotalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/health:
    get:
      tags:
        - Accounts
      summary: Get account health counts
      operationId: getAccountHealth
      responses:
        "200":
          description: Account health returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountHealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/{id}:
    get:
      tags:
        - Accounts
      summary: Get an account
      operationId: getAccount
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Account returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Accounts
      summary: Delete an account
      operationId: deleteAccount
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Account removed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/{id}/disconnect:
    patch:
      tags:
        - Accounts
      summary: Disconnect an account
      operationId: disconnectAccount
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Account disconnected successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/generate:
    post:
      tags:
        - AI
      summary: Generate AI content
      operationId: generateContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGenerateRequest"
      responses:
        "200":
          description: AI content generated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGenerationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/outreach:
    post:
      tags:
        - AI
      summary: Generate an outreach message
      operationId: generateOutreachMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiOutreachRequest"
      responses:
        "200":
          description: Outreach message generated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/followup:
    post:
      tags:
        - AI
      summary: Generate a follow-up message
      operationId: generateFollowupMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiFollowupRequest"
      responses:
        "200":
          description: Follow-up message generated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/rewrite:
    post:
      tags:
        - AI
      summary: Rewrite a message
      operationId: rewriteMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRewriteRequest"
      responses:
        "200":
          description: Message rewritten successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/subject:
    post:
      tags:
        - AI
      summary: Generate subject lines
      operationId: generateSubjectLines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSubjectRequest"
      responses:
        "200":
          description: Subject lines generated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/ai/history:
    get:
      tags:
        - AI
      summary: Get AI generation history
      operationId: getAiHistory
      responses:
        "200":
          description: AI generation history returned successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AiGeneration"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId.
      schema:
        type: string
        example: 64b7f2f62a37d55c9f1c1234

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ObjectId:
      type: string
      example: 64b7f2f62a37d55c9f1c1234

    TimestampFields:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    SuccessListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            count:
              type: integer
              example: 1

    MessageResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            message:
              type: string
              example: Resource deleted

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid credentials

    User:
      allOf:
        - type: object
          properties:
            id:
              $ref: "#/components/schemas/ObjectId"
            name:
              type: string
              example: Jane Doe
            email:
              type: string
              format: email
              example: jane@example.com
            company:
              type: string
              example: Acme Inc
            role:
              type: string
              example: user
            avatar:
              type: string
              nullable: true
        - $ref: "#/components/schemas/TimestampFields"

    AuthUser:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ObjectId"
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - company
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: secret123
        company:
          type: string
          example: Acme Inc

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: secret123

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    Platform:
      type: string
      enum:
        - linkedin
        - twitter
        - instagram
        - facebook
        - email

    LeadSource:
      type: string
      enum:
        - linkedin
        - twitter
        - instagram
        - facebook
        - website
        - manual

    LeadStatus:
      type: string
      enum:
        - new
        - contacted
        - qualified
        - proposal
        - won
        - lost

    LeadInput:
      type: object
      required:
        - firstName
        - email
      properties:
        firstName:
          type: string
          example: Alex
        lastName:
          type: string
          example: Morgan
        email:
          type: string
          format: email
          example: alex@example.com
        phone:
          type: string
          example: "+15551234567"
        company:
          type: string
          example: Example Co
        jobTitle:
          type: string
          example: Head of Sales
        source:
          $ref: "#/components/schemas/LeadSource"
        status:
          $ref: "#/components/schemas/LeadStatus"
        notes:
          type: string
          example: Interested in outbound automation.
        campaign:
          $ref: "#/components/schemas/ObjectId"

    LeadUpdateInput:
      allOf:
        - $ref: "#/components/schemas/LeadInput"

    Lead:
      allOf:
        - type: object
          properties:
            _id:
              $ref: "#/components/schemas/ObjectId"
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
            company:
              type: string
            jobTitle:
              type: string
            source:
              $ref: "#/components/schemas/LeadSource"
            status:
              $ref: "#/components/schemas/LeadStatus"
            notes:
              type: string
            campaign:
              oneOf:
                - $ref: "#/components/schemas/ObjectId"
                - type: object
                  properties:
                    _id:
                      $ref: "#/components/schemas/ObjectId"
                    name:
                      type: string
                    platform:
                      $ref: "#/components/schemas/Platform"
            owner:
              $ref: "#/components/schemas/ObjectId"
        - $ref: "#/components/schemas/TimestampFields"

    LeadResponse:
      allOf:
